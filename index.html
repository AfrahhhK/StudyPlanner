<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Include Bootstrap JavaScript and Popper.js -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</head>

<body>
    <!--Main Navigation-->
    <header>
        <!-- hamburger btn -->
        <button id="toggleButton"> <img src="bar.png"  style="height: 24px; padding: 2px;" alt=""></button>

        <!-- Sidebar -->
        <nav id="sidebarMenu" class="collapse d-lg-block sidebar collapse bg-white"> 

            <!-- cross button -->
            <div class="crossbtn" id="cross" style="text-align: right; padding:10px; cursor: pointer;" >
                <a class="closebtn" style="text-decoration: none; color: rgb(6, 38, 51);
                " onclick="toggleSidebar()">X</a>
            </div>

            <div class="position-sticky">
                <div class="list-group list-group-flush mx-3 mt-4">
                    <a href="#" class="list-group-item list-group-item-action py-2 ripple" aria-current="true">
                        <i class="fas fa-tachometer-alt fa-fw me-3"></i><span>Main dashboard</span>
                    </a>

                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-lock fa-fw me-3"></i><span>Password</span></a>                
                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-chart-bar fa-fw me-3"></i><span>Time table</span></a>
                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-globe fa-fw me-3"></i><span>Subjects</span></a>
                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-building fa-fw me-3"></i><span>Calendar</span></a>
                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-calendar fa-fw me-3"></i><span>Exams</span></a>
                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-users fa-fw me-3"></i><span>Users</span></a>
                    <a href="https://www.google.com/" class="list-group-item list-group-item-action py-2 ripple"><i
                            class="fas fa-money-bill fa-fw me-3"></i><span>Others</span></a>
                </div>
            </div>
            
        </nav>
      
    <!--Main Navigation-->

    <div class="container col-6">
        <div class="row">
            <h2>Enter details</h2>
            <form action=" " method="get">
                <div class="question" id="question1">
                    <label for="fname1">What is your name?</label><br>
                    <input type="text" id="fname1" name="fname1">
                </div>
                <div class="question" id="question2" style="display: none;">
                    <label for="fname2">What is your age?</label><br>
                    <input type="radio" id="18-22" name="age" value="18-22">
                    <label for="18-22">18 - 22</label><br>
                    <input type="radio" id="23-26" name="age" value="23-26">
                    <label for="23-26">23 - 26</label><br>              
                    <input type="radio" id="27-30" name="age" value="27-30">
                    <label for="27-30">27 - 30</label><br>              
                    
                </div>
                <div class="question" id="question3" style="display: none;">
                    <label for="gender">Select your gender:</label><br>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label><br>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label><br>                
                </div>
                <div class="question" id="question4" style="display: none;">
                    <label for="fname2">How many hours do you sleep for?</label><br>
                    <input type="text" id="fname2" name="fname2">
                </div>
            </form>
    
            <div class="d-flex justify-content-between">        
                <button class="btn" id="prev-button" style="float: right;">Previous</button>
                <button class="btn" id="next-button" style="float: right;">Next</button>
            </div>
        </div>
        
    </div>
    <script src="script.js"></script>
</body>

</html>
